<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimePocket</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Reference style.css stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>


<body class="min-h-screen flex flex-col overflow-auto md:h-screen md:overflow-hidden font-mono" style="background: var(--bg-page); color: var(--dark); transition: background 0.3s, color 0.3s;">
    <!-- NAVBAR -->
    <nav class="flex items-center justify-between px-10 h-16 shrink-0">
        <!-- Logo -->
        <div class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-full border-2 border-ui"></div>
        <span class="text-ui font-semibold">Logo</span>
        </div>
        <!-- Login tab and dark mode toggle -->
        <div class="flex items-center gap-3">
            <!-- Dark mode toggle -->
            <!-- Within the svg tag, its best practice to include xmlns="http://www.w3.org/2000/svg" to reference to the standalone svg file -->
            <!-- These are custom svg designs rendered on the spot -->
            <button id="theme-toggle" class="btn-icon" title="Toggle dark mode">
                <!-- Dark mode toggle: Moon (shown in light mode) -->
                <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <!-- Light mode toggle: Sun (shown in dark mode) -->
                <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <button id="btn-nav-login" class="btn-blue px-5 py-2 text-sm">Profile</button>
        </div>
    </nav>

    <!-- MAIN: two equal columns (stacks vertically on mobile) -->
    <main class="flex flex-col md:flex-row flex-1 md:overflow-hidden" style="background-color: var(--bg-timetable);">

        <!-- Left Column: Intro-->
        <div class="w-full md:flex-1 flex items-center justify-center p-10">
            <!-- Add in these attributes to see the border: rounded-3xl border-2 border-card  -->
            <div class="w-full max-w-sm h-[480px] md:h-full md:max-h-[520px] flex flex-col justify-center p-8">
            </div>
        </div>

        <!-- Right Column: Instructions -->
        <div class="w-full md:flex-1 flex flex-col items-center justify-center p-20">
        </div>
    </main>
</body>


<!-- JavaScript -->
<script>
    // Theme
    const root = document.documentElement;

    function applyTheme(dark) {
        root.classList.toggle('dark', dark);
        document.getElementById('icon-moon').style.display = dark ? 'none' : '';
        document.getElementById('icon-sun').style.display  = dark ? '' : 'none';
    }

    function toggleTheme() {
        const isDark = !root.classList.contains('dark');
        applyTheme(isDark);
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    applyTheme(localStorage.getItem('theme') === 'dark');

    // Event listeners
    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
</script>
</html>
