{% extends "base.html" %}

{% block css %} {% endblock %}

{% block script %} 
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}

{% block main %}
<!-- SETTINGS WINDOW -->
<div id="settings-window" class="grow m-4 p-4 rounded-3xl flex md:flex-row flex-col content-center" style="background: var(--bg-page-surface); color: var(--primary-text-colour);">
    <div id="profile-picture-container" class="flex flex-col justify-center items-center shrink-0 p-4">
        <div id="profile-picture" class="rounded-full md:size-64 size-48 border-4" style="border-color: var(--border-light);">
        </div>
        <button id="btn-change-avatar" class="btn-blue m-2">Change Avatar</button>
    </div>
    <div id="user-info" class="grow flex flex-col gap-2 md:justify-center p-4">
        <div name="username">
            <p class="text-xl"> Username:</p>
            <div class="border-2 rounded-[20px] flex items-center p-3" style="border-color: var(--border-darker);">
                <span id="username-display">
                    <p class="italic" style="color: var(--text-secondary)"> username </p>
                </span>
            </div>
        </div>
        <div name="email">
            <p class="text-xl"> Email: </p>
            <div class="border-2 rounded-[20px] flex items-center p-3" style="border-color: var(--border-darker);"> 
                <span id="user-email">
                    <p class="italic" style="color: var(--text-secondary)"> email </p>
                </span>
            </div>
        </div>
        <div name="bio">
            <p class="text-xl"> Bio: </p>
            <div class="border-2 rounded-[20px] flex items-center p-3" style="border-color: var(--border-darker);"> 
                <span id="user-bio">
                    <p class="italic" style="color: var(--text-secondary)"> No bio... Create one with the button below! </p>
                </span>
            </div>
        </div>
        <div id="user-interests">
            <p class="text-xl"> Interests: </p>
            <div id="interests-container" class="border-2 rounded-[20px] flex items-center p-3" style="border-color: var(--border-darker);">
                <div id="interest" class="interest" style="background: var(--bg-hover);"> Interest </div>
            </div>
        </div>
        <div id="account-modifications" class="flex gap-2 flex-wrap justify-center md:justify-start">
            <button class="text-sm p-2 shrink-0 rounded-full border change-btn"> Update bio </button>
            <button class="text-sm p-2 shrink-0 rounded-full border change-btn"> Choose Interests </button>
            <button class="text-sm p-2 shrink-0 rounded-full border change-btn"> Change password </button>
            <button class="text-sm p-2 shrink-0 rounded-full border change-btn"> Change email </button>
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
<style>
    .interest {
        padding: 0.5rem;
        padding-inline: 1rem;
        border-radius: 3rem;
        font-size: 0.75rem;
    }

    .change-btn {
        border-color: var(--border-darker);
        color: var(--text-secondary);
        transition: background 0.15s;
    }

    .change-btn:hover {
        background-color: var(--bg-hover);
    }
</style>
{% endblock %}
