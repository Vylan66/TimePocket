{% extends "base.html" %}

{% block css %} {% endblock %}

{% block script %} {% endblock %}

{% block main %}
        <!-- SETTINGS WINDOW -->
        <div id="settings-window" class="grow m-8 p-8 rounded-3xl flex flex-row content-center" style="background: var(--bg-surface);">
            <!--
                Need profile image
                Need user name
                Need email
                Need button for changing password
            -->
            <div id="profile-picture-container" class="flex flex-col justify-center items-center shrink-0 p-4">
                <div id="profile-picture" class="rounded-full size-64 border-4" style="border-color: var(--border-light);">

                </div>
                <!-- Button for changing avatar, opens a dialog that gives some options -->
            </div>
            <div id="user-info" class="grow flex flex-col justify-center p-4">
                <div id="username" class="text-2xl">
                    <p> Username: {{ username }}</p>
                </div>
                <div id="email" class="text-2xl">
                    <p> Email: {{ email }}</p>
                </div>
                <div id="change-password">
                    <!-- Button? -->
                </div>
            </div>
        </div>
{% endblock %}

{% block content %} {% endblock %}
