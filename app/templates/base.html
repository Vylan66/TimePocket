<!DOCTYPE html>
<html>
    <head lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimePocket - {{ pageName }}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mini_cal.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/timetable.css') }}">
</head>

    <body class="min-h-screen md:h-screen flex flex-col md:overflow-hidden font-mono" style="background: var(--bg-page); color: var(--dark); transition: background 0.3s, color 0.3s;">
        <nav class="flex items-center justify-between px-10 h-16 shrink-0 relative">
            <div class="flex items-center gap-2 shrink-0">
                <div class="w-9 h-9 rounded-full border-2 [border-color:var(--border-ui)]"></div>
                <span class="font-semibold [color:var(--text-ui)]">Logo</span>
            </div>
            <div id="nav-bar" class="hidden md:flex flex-row gap-1 self-end">
                <button class="text-sm nav-tab" id="dash-link">Dashboard</button>
                <button class="text-sm nav-tab" id="personal-timetable-link">My Timetable</button>
                <button class="text-sm nav-tab" id="groups-link">Groups</button>
                <button class="text-sm nav-tab" id="friends-link">Friends</button>
            </div>
            <div class="flex items-center gap-3 shrink-0">
                <button id="hamburger-btn" class="btn-icon md:hidden" title="Menu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <button id="theme-toggle" class="btn-icon" title="Toggle dark mode">
                    <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
                <button id="profile-link" class="btn-blue px-5 py-2 text-sm">Profile</button>
            </div>
            <!-- Mobile dropdown -->
            <div id="mobile-nav" class="mobile-nav md:hidden">
                <button class="mobile-nav-item" data-page="dashboard">Dashboard</button>
                <button class="mobile-nav-item" data-page="personal">My Timetable</button>
                <button class="mobile-nav-item" data-page="group">Groups</button>
                <button class="mobile-nav-item" data-page="friends">Friends</button>
            </div>
        </nav>
        {% block content %} {% endblock %}
        <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    </body>
</html>
